<!-- Title / description -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}">
<meta property="og:type" content="article">
<meta property="og:url" content="{{ .Permalink }}">

<!-- Page resource featured image (works when image sits beside index.md) -->
{{ with .Resources.GetMatch "featured-og*" }}
  {{ $img := .Fill "1200x630 center" }}
  <meta property="og:image" content="{{ $img.Permalink }}">
  <meta property="og:image:width" content="{{ $img.Width }}">
  <meta property="og:image:height" content="{{ $img.Height }}">
  <link rel="image_src" href="{{ $img.Permalink }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ $img.Permalink }}">
{{ else }}
  <meta name="twitter:card" content="summary">
{{ end }}
