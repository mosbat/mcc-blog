{{- $src := .Get "src" -}}
{{- if not $src -}}
  {{- errorf "video-remote shortcode requires src" -}}
{{- end -}}

{{- $poster := .Get "poster" -}}
{{- $preload := .Get "preload" | default "metadata" -}}
{{- $title := .Get "title" | default "" -}}

<figure class="my-8">
  <video
    controls
    preload="{{ $preload }}"
    playsinline
    style="width:100%; max-width:900px; height:auto; border-radius:12px;"
    {{ with $poster }}poster="{{ . }}"{{ end }}
  >
    <source src="{{ $src }}" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  {{ with $title }}
    <figcaption class="mt-2 text-sm opacity-80">{{ . }}</figcaption>
  {{ end }}
</figure>
